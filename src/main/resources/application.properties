# ==============================================================================
# QUARKUS CONFIGURATION PROPERTIES - CRYPTOCURRENCY ALERT SYSTEM
# ==============================================================================

# Server configuration
quarkus.http.port=8080

# JSON serialization configuration (Jackson)
quarkus.jackson.fail-on-empty-beans=false
quarkus.jackson.write-dates-as-timestamps=false

# Database Configuration (PostgreSQL Reactive)
quarkus.datasource.db-kind=postgresql

# Dev mode configurations (using Quarkus Dev Services if Docker is available)
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.log.format-sql=true

# Production configurations (Requires real database credentials)
%prod.quarkus.datasource.reactive.url=postgresql://localhost:5432/crypto_alerts
%prod.quarkus.datasource.username=postgres
%prod.quarkus.datasource.password=postgres
%prod.quarkus.hibernate-orm.database.generation=update

# Custom Application Config - External API Integration (e.g. Binance WebSocket)
crypto.binance.websocket.url=wss://stream.binance.com:9443
crypto.binance.symbols=BTCUSDT,ETHUSDT
crypto.binance.api.url=https://api.binance.com
%test.crypto.binance.enabled=false

# Logger settings
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
%dev.quarkus.log.category."com.cryptoalert".level=DEBUG
